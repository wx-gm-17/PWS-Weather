name: Daily Weather Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4 # Already v4, which is good

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Harvest
        run: python harvest.py

      - name: Save Data
        run: |
          git config --global user.name "Weather Bot"
          git config --global user.email "bot@github.com"
          git add weather_history.json
          git commit -m "Update history: $(date)" || exit 0
          git push
