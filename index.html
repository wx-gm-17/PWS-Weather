<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐾 Cannoli Pro X</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>

<style>
:root { --bg: #060d14; --card: rgba(18, 32, 47, 0.95); --accent: #00d2ff; --border: rgba(255, 255, 255, 0.15); --text: #fff; }
body { margin:0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
header { background: #0b141d; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); }
#status-tag { font-size: 12px; color: #8899a6; font-weight: 700; text-transform: uppercase; }
.controls { background: #0b141d; padding: 10px 25px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); overflow-x: auto; align-items: center; }
.btn { background: var(--accent); border: none; padding: 10px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; color: #000; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
.btn-filter { background: #1c3d5a; color: white; opacity: 0.6; }
.btn-filter.active { background: var(--accent); color: #000; opacity: 1; }
.btn-csv { background: #2ecc71; margin-left: auto; }
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
.card { background: var(--card); padding: 30px 20px; border-radius: 28px; text-align: center; border: 2px solid var(--border); cursor: pointer; }
.label { font-size: 13px; text-transform: uppercase; color: #8899a6; font-weight: 900; letter-spacing: 2px; }
.main-val { font-size: 64px; font-weight: 900; margin: 5px 0; }
.sub-val { font-size: 16px; color: var(--accent); font-weight: 700; }
.occurrence { font-size: 11px; color: #5c6d7a; margin-top: 8px; display: block; line-height: 1.4; font-family: monospace; }
.summary-container { margin: 0 25px 25px; background: #0b141d; border-radius: 20px; border: 2px solid var(--border); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #14212d; color: var(--accent); padding: 15px; text-align: left; text-transform: uppercase; font-size: 11px; }
td { padding: 14px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; }
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; flex-direction:column; }
.toolbar { display:flex; padding:15px; background: #0b141d; border-bottom: 2px solid var(--border); align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 20px; }
.chart-box { height: 65vh; background: #000; border-radius: 16px; padding: 15px; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div style="font-weight: 900; font-size: 20px; letter-spacing: -1px;">🐾 CANNOLI PRO X</div>
  <div id="status-tag">INITIALIZING...</div>
</header>

<div class="controls">
  <button class="btn btn-filter active" id="f-1" onclick="setFilter(1)">Today</button>
  <button class="btn btn-filter" id="f-7" onclick="setFilter(7)">Week</button>
  <button class="btn btn-filter" id="f-30" onclick="setFilter(30)">Month</button>
  <button class="btn btn-filter" id="f-365" onclick="setFilter(365)">Year</button>
  <button class="btn btn-csv" onclick="downloadCSV()">💾 CSV EXPORT</button>
</div>

<div class="dashboard">
  <div class="card" onclick="openChart('temp')">
    <div class="label">Temperature</div>
    <div id="v-temp" class="main-val">--</div>
    <div id="v-feels" class="sub-val">--</div>
    <span id="v-temp-range" class="occurrence">--</span>
  </div>
  
  <div class="card" onclick="openChart('wind')">
    <div class="label">Wind Speed</div>
    <div id="v-wind" class="main-val">--</div>
    <div id="v-gust" class="sub-val">--</div>
    <span id="v-wind-max" class="occurrence">--</span>
  </div>

  <div class="card" onclick="openChart('humidity')">
    <div class="label">Humidity</div>
    <div id="v-hum" class="main-val">--</div>
    <div id="v-pressure" class="sub-val">--</div>
    <span class="occurrence">Rel. Humidity & Pressure</span>
  </div>

  <div class="card" onclick="openChart('solar')">
    <div class="label">Solar</div>
    <div id="v-sol" class="main-val">--</div>
    <div id="v-uv" class="sub-val">--</div>
    <span class="occurrence">Radiation (W/m²)</span>
  </div>
</div>

<div class="summary-container">
  <table>
    <thead><tr><th id="summary-title">RISK ANALYSIS</th><th>HI</th><th>LO</th><th>AVG</th></tr></thead>
    <tbody id="summary-body"></tbody>
  </table>
</div>

<div id="overlay-chart" class="overlay">
  <div class="toolbar">
    <h2 id="chart-title" style="flex:1; margin:0; font-size:14px; text-transform:uppercase;">Trend Analysis</h2>
    <button class="btn" onclick="closeOverlay('overlay-chart')" style="background:#ff4d4d; color:white;">CLOSE ✕</button>
  </div>
  <div class="content"><div class="chart-box"><canvas id="main-canvas"></canvas></div></div>
</div>

<script>
let allData = [], filteredData = [], chartInstance = null;

function safeDate(ts) {
    if (!ts || isNaN(ts)) return "N/A";
    return luxon.DateTime.fromSeconds(Number(ts)).toFormat('MMM d, h:mm a');
}

async function init() {
    try {
        const r = await fetch('./weather_history.json?v=' + Date.now());
        if (!r.ok) throw new Error("Data file not found");
        allData = await r.json();
        
        // Remove any record that has a null timestamp
        allData = allData.filter(d => d && d.timestamp && !isNaN(d.timestamp));
        allData.sort((a,b) => a.timestamp - b.timestamp);
        
        document.getElementById('status-tag').innerText = `${allData.length.toLocaleString()} Records Connected`;
        setFilter(1); // Set to Today immediately
    } catch (e) { 
        document.getElementById('status-tag').innerText = "Load Error";
        console.error(e);
    }
}

function setFilter(days) {
    const nowSecs = Math.floor(Date.now() / 1000);
    const cutoff = nowSecs - (days * 24 * 60 * 60);
    
    filteredData = (days === 365) ? allData : allData.filter(d => d.timestamp >= cutoff);
    
    // Update button colors
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    document.getElementById(`f-${days}`).classList.add('active');
    
    renderDashboard(days);
}

function renderDashboard(days) {
    if (!filteredData.length || !allData.length) return;
    
    // Current weather is ALWAYS from the absolute last record in allData
    const current = allData[allData.length - 1].ob;
    
    document.getElementById('v-temp').innerText = Math.round(current.tempF || 0) + "°";
    document.getElementById('v-feels').innerText = "FEELS: " + Math.round(current.feelslikeF || current.tempF || 0) + "°";
    document.getElementById('v-wind').innerText = Math.round(current.windSpeedMPH || 0);
    document.getElementById('v-gust').innerText = "GUST: " + Math.round(current.windGustMPH || 0) + " MPH";
    document.getElementById('v-hum').innerText = (current.humidity || 0) + "%";
    document.getElementById('v-pressure').innerText = (current.pressureMB || 0) + " hPa";
    document.getElementById('v-sol').innerText = current.solradWM2 || 0;
    document.getElementById('v-uv').innerText = "UV: " + (current.uv || 0);

    // Max/Min from the filtered subset
    const temps = filteredData.map(d => ({ v: d.ob.tempF, t: d.timestamp }));
    const maxT = temps.reduce((p, c) => (p.v > c.v) ? p : c);
    const minT = temps.reduce((p, c) => (p.v < c.v) ? p : c);
    
    const windGusts = filteredData.map(d => ({ v: d.ob.windGustMPH || 0, t: d.timestamp }));
    const maxW = windGusts.reduce((p, c) => (p.v > c.v) ? p : c);

    document.getElementById('v-temp-range').innerHTML = `MAX: ${Math.round(maxT.v)}° (${safeDate(maxT.t)})<br>MIN: ${Math.round(minT.v)}° (${safeDate(minT.t)})`;
    document.getElementById('v-wind-max').innerText = `PEAK: ${Math.round(maxW.v)} MPH (${safeDate(maxW.t)})`;

    document.getElementById('summary-title').innerText = days === 1 ? "Today's Risk Analysis" : `${days}-Day Analysis`;
    buildSummaryTable();
}

function buildSummaryTable() {
    const metrics = [
        { name: 'Temperature', key: 'tempF', unit: '°' },
        { name: 'Wind Speed', key: 'windSpeedMPH', unit: ' mph' },
        { name: 'Humidity', key: 'humidity', unit: '%' }
    ];

    document.getElementById('summary-body').innerHTML = metrics.map(m => {
        const vals = filteredData.map(d => d.ob[m.key]).filter(v => v !== null && !isNaN(v));
        if (!vals.length) return '';
        const high = Math.max(...vals), low = Math.min(...vals), avg = vals.reduce((a,b)=>a+b)/vals.length;
        return `<tr><td>${m.name}</td><td>${Math.round(high)}${m.unit}</td><td>${Math.round(low)}${m.unit}</td><td>${Math.round(avg)}${m.unit}</td></tr>`;
    }).join('');
}

function openChart(type) {
    document.getElementById('overlay-chart').style.display = 'flex';
    const ctx = document.getElementById('main-canvas');
    if (chartInstance) chartInstance.destroy();
    
    const keyMap = { temp: 'tempF', wind: 'windSpeedMPH', humidity: 'humidity', solar: 'solradWM2' };
    
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: type.toUpperCase(),
                data: filteredData.map(d => ({ x: d.timestamp * 1000, y: d.ob[keyMap[type]] })),
                borderColor: '#00d2ff', borderWidth: 2, fill: true, backgroundColor: 'rgba(0,210,255,0.1)', pointRadius: 0, tension: 0.1
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                x: { type: 'time', time: { unit: 'day' }, grid: { display: false } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        }
    });
}

function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
function downloadCSV() { /* Export Logic */ }

init();
</script>
</body>
</html>
