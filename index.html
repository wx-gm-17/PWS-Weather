<script>
    async function init() {
        const status = document.getElementById('status-msg');
        try {
            const response = await fetch('./weather_history.json');
            const data = await response.json();
            if (!data || data.length === 0) throw new Error("Data file is empty.");
            
            status.style.display = 'none';

            // Xweather format: entry.timestamp and entry.ob.tempF
            const chartData = data.map(entry => {
                return { 
                    x: entry.timestamp * 1000, 
                    y: entry.ob ? entry.ob.tempF : null 
                };
            }).filter(p => p.y !== null);

            const ctx = document.getElementById('historyChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Temperature (°F)',
                        data: chartData,
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        pointRadius: 0,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'day' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        } catch (err) {
            status.innerText = "❌ Error: " + err.message;
        }
    }
    init();
</script>
